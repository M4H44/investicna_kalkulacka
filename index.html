<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investičná kalkulačka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">📈 Investičná kalkulačka</span>
    </div>
</nav>

<div class="container my-5">
    <h1 class="text-center mb-2">Koľko budem mať o X rokov?</h1>
    <p class="text-center text-muted mb-5">Zadaj parametre a zisti reálnu hodnotu svojich investícií</p>

    <!-- FORMULÁR -->
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Mesačná investícia (€)</label>
                        <input type="number" id="mesacnaInvesticia" class="form-control" value="100" min="1">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Počet rokov</label>
                        <input type="number" id="pocetRokov" class="form-control" value="20" min="1" max="50">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Váš vek</label>
                        <input type="number" id="vek" class="form-control" value="30" min="18" max="70">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Ročná inflácia (%)</label>
                        <input type="number" id="inflacia" class="form-control" value="3" min="0" max="20">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Rizikový profil</label>
                        <select id="riziko" class="form-select">
                            <option value="konzervativny">Konzervatívny</option>
                            <option value="vyvazeny" selected>Vyvážený</option>
                            <option value="agresivny">Agresívny</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Investičný horizont</label>
                        <select id="horizont" class="form-select">
                            <option value="kratky">Krátkodobý (do 5 rokov)</option>
                            <option value="dlhy" selected>Dlhodobý (nad 5 rokov)</option>
                        </select>
                    </div>

                    <button onclick="vypocitaj()" class="btn btn-success w-100 fw-bold fs-5">
                        Vypočítať 🚀
                    </button>

                </div>
            </div>
        </div>
    </div>

    <!-- VÝSLEDKY -->
    <div id="vysledky" class="row justify-content-center mt-5" style="display:none">
        <div class="col-md-10">

            <!-- TABUĽKA -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h4 class="text-center mb-4">📊 Výsledky podľa indexu</h4>
                    <div id="tabulkaVysledkov"></div>
                </div>
            </div>

            <!-- ODPORÚČANIE ETF -->
            <div class="card shadow-sm mb-4 border-success">
                <div class="card-body">
                    <h4 class="text-center mb-3">✅ Odporúčané ETF</h4>
                    <div id="odporucanie"></div>
                </div>
            </div>

            <!-- GRAF -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h4 class="text-center mb-3">📈 Vývoj investície v čase</h4>
                    <canvas id="graf"></canvas>
                </div>
            </div>

            <!-- BROKERI -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="text-center mb-4">🏦 Porovnanie brokerov</h4>
                    <div id="brokeri"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
